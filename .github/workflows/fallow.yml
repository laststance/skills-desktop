name: Fallow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dead-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Fallow dead-code
        run: npx fallow dead-code --fail-on-issues --format compact
