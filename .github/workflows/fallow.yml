name: Fallow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fallow:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dead-code
            command: dead-code
            args: ''
          - name: dupes
            command: dupes
            args: ''
          - name: health
            command: health
            args: '--complexity'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Fallow ${{ matrix.name }}
        run: pnpm exec fallow ${{ matrix.command }} ${{ matrix.args }} --fail-on-issues --format compact
