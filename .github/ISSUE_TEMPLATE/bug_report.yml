name: Bug report
description: Report a reproducible non-security bug.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        If this is a security vulnerability, do not file a public issue. Follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Skills Desktop version
      placeholder: 0.26.1
  - type: input
    id: macos
    attributes:
      label: macOS version and architecture
      placeholder: macOS 15.x, Apple Silicon
