allowBuilds:
  # Click-to-source does not use Code Inspector's optional terminal probe.
  '@code-inspector/core': false
  electron: true
  electron-winstaller: false
  esbuild: true
  fallow: false
  # Keep the unused native PTY compiler blocked from install-time execution.
  node-pty: false
  sharp: true
  unrs-resolver: true

# Supply-chain security (migrated from .npmrc 2026-04-22)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@types/react'
  - '@types/react-dom'
  - typescript
  - vite
  - vitest
  - '@vitejs/plugin-react'
  - eslint
  - prettier
  - tailwindcss
  - '@tanstack/react-query'
  - zod
  - react-hook-form
  - eslint-config-ts-prefixer
  - '@laststance/redux-storage-middleware'
  - '@laststance/react-next-eslint-plugin'

# TypeScript 7 RC ships the native compiler preview without the legacy JS API.
# Lint/docgen scripts preload scripts/use-legacy-typescript-js-api.cjs until upstream tools support TS7.
peerDependencyRules:
  allowedVersions:
    typescript: 7.0.1-rc
