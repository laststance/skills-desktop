allowBuilds:
  electron: true
  electron-winstaller: false
  esbuild: true
  fallow: false
  sharp: true
  unrs-resolver: true

# Supply-chain security (migrated from .npmrc 2026-04-22)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@types/react'
  - '@types/react-dom'
  - typescript
  - vite
  - vitest
  - '@vitejs/plugin-react'
  - eslint
  - prettier
  - tailwindcss
  - '@tanstack/react-query'
  - zod
  - react-hook-form
  - eslint-config-ts-prefixer
  - '@laststance/redux-storage-middleware'
  - '@laststance/react-next-eslint-plugin'
